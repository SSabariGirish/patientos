<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Breaker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* A little custom CSS to push the footer to the bottom */
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; }
        main { flex: 1; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">💊 Medicine Breaker</a>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light text-center py-3 mt-auto">
        <div class="container">
            <small class="text-muted">
                <strong>Disclaimer:</strong> This tool is for educational purposes only and does not replace professional medical advice. 
                Always consult a healthcare provider before making medication decisions.
            </small>
        </div>
    </footer>

</body>
</html>
